<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>龙虎榜</title>

  <style>
    :root{
      --bg:#070707;
      --bg2:#111111;
      --gold:#d4af37;
      --gold-light:#f4df9b;
      --gold-deep:#9c7418;
      --text:#f5f1e8;
      --muted:#c8b98f;
      --line:rgba(212,175,55,.18);
      --card-bg:rgba(255,255,255,.03);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --max-width:1100px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at top left, rgba(212,175,55,.10), transparent 30%),
        radial-gradient(circle at top right, rgba(212,175,55,.06), transparent 25%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color:var(--text);
      font-family:
        -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",
        "Hiragino Sans GB","Microsoft YaHei",sans-serif;
      min-height:100vh;
    }

    img{
      max-width:100%;
      display:block;
      border:0;
    }

    .page{
      width:100%;
      max-width:var(--max-width);
      margin:0 auto;
      padding:14px 14px 32px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      background:rgba(7,7,7,.96);
      border-bottom:1px solid var(--line);
      backdrop-filter:saturate(120%) blur(6px);
    }

    .topbar-inner{
      width:100%;
      max-width:var(--max-width);
      margin:0 auto;
      padding:12px 14px 14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .brand{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .brand-name{
      font-size:18px;
      font-weight:800;
      letter-spacing:.10em;
      line-height:1;
      background:linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-deep));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      white-space:nowrap;
    }

    .nav{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }

    .nav-btn{
      flex:1;
      min-width:0;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      color:var(--text);
      border-radius:999px;
      padding:10px 0;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:.2s ease;
      white-space:nowrap;
      text-align:center;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav-btn.active{
      color:#111;
      background:linear-gradient(180deg, var(--gold-light), var(--gold));
      border-color:rgba(244,223,155,.5);
      box-shadow:0 4px 14px rgba(212,175,55,.28);
    }

    .view{
      display:none;
      margin-top:18px;
    }

    .view.active{
      display:block;
    }

    .poster-shell,
    .points-shell{
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .poster-shell{
      padding:18px;
    }

    .poster-frame{
      width:100%;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, rgba(212,175,55,.08), transparent 30%),
        rgba(255,255,255,.02);
      border:1px solid rgba(212,175,55,.10);
      border-radius:16px;
      overflow:hidden;
    }

    .poster-frame img{
      width:100%;
      height:auto;
      object-fit:contain;
      border-radius:12px;
    }

    .poster-fallback{
      padding:40px 20px;
      text-align:center;
      color:var(--muted);
      font-size:16px;
      display:none;
    }

    .points-shell{
      padding:18px;
    }

    .points-title{
      margin:4px 0 18px;
      text-align:center;
      font-size:34px;
      line-height:1.1;
      font-weight:900;
      letter-spacing:.10em;
      background:linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-deep));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .points-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
    }

    .point-card{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--card-bg);
      padding:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      box-shadow:var(--shadow);
      min-width:0;
    }

    .point-left{
      min-width:0;
      flex:1;
    }

    .group-pill{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--gold-light);
      background:rgba(212,175,55,.08);
      font-size:12px;
      font-weight:700;
      letter-spacing:.06em;
      margin-bottom:10px;
    }

    .person-name{
      margin:0;
      font-size:28px;
      font-weight:900;
      line-height:1.15;
      color:var(--text);
      word-break:break-all;
    }

    .point-right{
      text-align:right;
      flex-shrink:0;
    }

    .rank{
      font-size:30px;
      font-weight:900;
      line-height:1;
      letter-spacing:.04em;
      background:linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-deep));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .score-label{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.06em;
    }

    .score-value{
      margin-top:4px;
      font-size:20px;
      font-weight:800;
      color:var(--gold-light);
      line-height:1;
    }

    @media (max-width: 768px){
      .topbar-inner{
        padding:12px 10px 14px;
        gap:10px;
      }

      .brand-name{
        font-size:16px;
      }

      .nav{
        gap:6px;
      }

      .nav-btn{
        font-size:12px;
        padding:10px 0;
      }

      .poster-shell,
      .points-shell{
        border-radius:18px;
      }

      .poster-shell{
        padding:12px;
      }

      .poster-frame{
        min-height:220px;
        border-radius:14px;
      }

      .points-title{
        font-size:26px;
        margin-bottom:14px;
      }

      .points-grid{
        grid-template-columns:1fr;
      }

      .point-card{
        padding:14px;
      }

      .person-name{
        font-size:24px;
      }

      .rank{
        font-size:26px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-name">MVP FAMILY</div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-btn active" data-target="sales" type="button">销冠龙虎榜</button>
        <button class="nav-btn" data-target="single" type="button">单王龙虎榜</button>
        <button class="nav-btn" data-target="recruit" type="button">招募龙虎榜</button>
        <button class="nav-btn" data-target="points" type="button">积分龙虎榜</button>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="view active" id="view-sales">
      <div class="poster-shell">
        <div class="poster-frame">
          <img
            src="./posters/sales.JPEG"
            alt="销冠龙虎榜海报"
            onerror="this.style.display='none'; this.parentNode.querySelector('.poster-fallback').style.display='block';"
          >
          <div class="poster-fallback">销冠龙虎榜海报未找到</div>
        </div>
      </div>
    </section>

    <section class="view" id="view-single">
      <div class="poster-shell">
        <div class="poster-frame">
          <img
            src="./posters/single.JPEG"
            alt="单王龙虎榜海报"
            onerror="this.style.display='none'; this.parentNode.querySelector('.poster-fallback').style.display='block';"
          >
          <div class="poster-fallback">单王龙虎榜海报未找到</div>
        </div>
      </div>
    </section>

    <section class="view" id="view-recruit">
      <div class="poster-shell">
        <div class="poster-frame">
          <img
            src="./posters/recruit.jpg"
            alt="招募龙虎榜海报"
            onerror="this.style.display='none'; this.parentNode.querySelector('.poster-fallback').style.display='block';"
          >
          <div class="poster-fallback">招募龙虎榜海报未找到</div>
        </div>
      </div>
    </section>

    <section class="view" id="view-points">
      <div class="points-shell">
        <h2 class="points-title">积分排行榜</h2>
        <div class="points-grid" id="pointsGrid"></div>
      </div>
    </section>
  </main>

  <script>
    const POINTS_DATA = [
      { rank:"01", group:"MVP总区", name:"梁 莉", metric:1325 },
      { rank:"02", group:"V组", name:"Katherine", metric:1205 },
      { rank:"03", group:"WENNY组", name:"许 婷", metric:310 },
      { rank:"04", group:"WENNY组", name:"黄文璇", metric:290 },
      { rank:"05", group:"景程家办", name:"Lawrence", metric:260 },
      { rank:"06", group:"NINA组", name:"宋佳林", metric:230 }
    ];

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (m) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m];
      });
    }

    function renderPoints() {
      const container = document.getElementById('pointsGrid');
      container.innerHTML = POINTS_DATA.map(function(item) {
        return `
          <div class="point-card">
            <div class="point-left">
              <div class="group-pill">${escapeHtml(item.group)}</div>
              <p class="person-name">${escapeHtml(item.name)}</p>
            </div>
            <div class="point-right">
              <div class="rank">${escapeHtml(item.rank)}</div>
              <div class="score-label">积分</div>
              <div class="score-value">${escapeHtml(item.metric)}分</div>
            </div>
          </div>
        `;
      }).join('');
    }

    renderPoints();

    const nav = document.getElementById('nav');
    const buttons = nav.querySelectorAll('.nav-btn');
    const views = {
      sales: document.getElementById('view-sales'),
      single: document.getElementById('view-single'),
      recruit: document.getElementById('view-recruit'),
      points: document.getElementById('view-points')
    };

    function setActive(target) {
      buttons.forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.target === target);
      });

      Object.keys(views).forEach(function(key) {
        views[key].classList.toggle('active', key === target);
      });

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    nav.addEventListener('click', function(e) {
      const btn = e.target.closest('.nav-btn');
      if (!btn) return;
      setActive(btn.dataset.target);
    });
  </script>
</body>
</html>
