<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>龙虎榜</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#050507;
      --bg1:#0a0a10;
      --gold:#d6b15e;
      --gold2:#f6e5a4;
      --gold3:#b8842b;
      --text:#efece3;
      --line:#ffffff14;
      --glow: 0 0 26px rgba(214,177,94,.22), 0 0 80px rgba(214,177,94,.12);
      --shadow: 0 28px 90px rgba(0,0,0,.58);
      --max: 1180px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Noto Sans SC", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC","Microsoft YaHei", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 12% 0%, rgba(214,177,94,.12), transparent 55%),
        radial-gradient(900px 600px at 85% 10%, rgba(246,229,164,.07), transparent 58%),
        radial-gradient(900px 700px at 50% 110%, rgba(214,177,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    .dust{
      position:fixed; inset:0;
      pointer-events:none;
      background:
        radial-gradient(1px 1px at 10% 15%, rgba(246,229,164,.80), transparent 55%),
        radial-gradient(1px 1px at 35% 65%, rgba(214,177,94,.60), transparent 55%),
        radial-gradient(1px 1px at 60% 25%, rgba(246,229,164,.55), transparent 55%),
        radial-gradient(1px 1px at 88% 70%, rgba(214,177,94,.70), transparent 55%),
        radial-gradient(1px 1px at 52% 52%, rgba(246,229,164,.45), transparent 55%);
      opacity:.55;
      mix-blend-mode:screen;
      filter: blur(.25px);
      animation: drift 16s linear infinite;
    }
    @keyframes drift{
      from{transform:translate3d(0,0,0)}
      to{transform:translate3d(-36px,24px,0)}
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:60;
      backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(5,5,7,.9), rgba(5,5,7,.62));
      border-bottom:1px solid var(--line);
    }

    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand img{
      width:48px;
      height:48px;
      object-fit:contain;
      border-radius:12px;
      border:1px solid rgba(246,229,164,.16);
      background: rgba(255,255,255,.02);
      filter: drop-shadow(0 18px 30px rgba(214,177,94,.25));
    }

    .brand-name{
      font-family:"Cinzel", serif;
      font-size:16px;
      letter-spacing:.12em;
      background: linear-gradient(180deg, var(--gold2), var(--gold), var(--gold3));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      cursor:pointer;
      user-select:none;
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      letter-spacing:.08em;
      border:1px solid rgba(246,229,164,.16);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      transition:.25s ease;
      position:relative;
      overflow:hidden;
      color:var(--text);
    }

    .pill::before{
      content:"";
      position:absolute;
      inset:-2px;
      background: linear-gradient(135deg, rgba(214,177,94,.25), transparent 45%, rgba(246,229,164,.18));
      opacity:0;
      transition:.25s ease;
    }

    .pill:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 34px rgba(0,0,0,.35);
    }

    .pill:hover::before{opacity:1}

    .pill.active{
      border-color: rgba(246,229,164,.38);
      background: linear-gradient(135deg, rgba(214,177,94,.22), rgba(255,255,255,.03));
      box-shadow: var(--glow);
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:22px 16px 60px;
    }

    .view{
      display:none;
      animation: fadeUp .35s ease both;
    }

    .view.active{
      display:block;
    }

    @keyframes fadeUp{
      from{opacity:0; transform: translateY(10px)}
      to{opacity:1; transform: translateY(0)}
    }

    .poster-box{
      border-radius:26px;
      overflow:hidden;
      border:1px solid rgba(246,229,164,.14);
      box-shadow: var(--shadow);
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(214,177,94,.14), transparent 55%),
        radial-gradient(900px 600px at 85% 15%, rgba(246,229,164,.07), transparent 58%),
        linear-gradient(180deg, #050507, #0a0a12);
      padding:18px;
    }

    .poster-frame{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(246,229,164,.14);
      background: rgba(255,255,255,.03);
      min-height: 540px;
    }

    .poster-frame img{
      display:block;
      width:100%;
      max-width:760px;
      height:auto;
      object-fit:contain;
      border-radius:18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }

    .points-board{
      border-radius:26px;
      overflow:hidden;
      border:1px solid rgba(246,229,164,.14);
      box-shadow: var(--shadow);
      background:
        radial-gradient(1100px 700px at 20% 20%, rgba(214,177,94,.14), transparent 58%),
        radial-gradient(900px 600px at 85% 40%, rgba(246,229,164,.06), transparent 60%),
        linear-gradient(180deg, #050507, #0a0a12);
      padding:24px 18px 24px;
    }

    .points-title{
      text-align:center;
      margin:0 0 18px;
      font-size:46px;
      font-weight:900;
      letter-spacing:.14em;
      background: linear-gradient(180deg, var(--gold2), var(--gold), #a06a16);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow: 0 20px 80px rgba(214,177,94,.14);
    }

    .points-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media (max-width: 840px){
      .points-grid{grid-template-columns:1fr}
      .points-title{font-size:34px}
      .poster-frame{min-height: 320px;}
    }

    .p-card{
      border-radius:22px;
      border:1px solid rgba(246,229,164,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: 0 22px 70px rgba(0,0,0,.52);
      overflow:hidden;
      position:relative;
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .p-card::after{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(420px 180px at 25% 45%, rgba(246,229,164,.10), transparent 70%),
        radial-gradient(520px 220px at 90% 70%, rgba(214,177,94,.12), transparent 72%);
      pointer-events:none;
    }

    .p-left, .p-right{
      position:relative;
      z-index:2;
    }

    .p-left{
      min-width:0;
      flex:1 1 auto;
    }

    .pill-group{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(246,229,164,.16);
      background: rgba(0,0,0,.28);
      letter-spacing:.14em;
      font-weight:700;
      color: rgba(246,229,164,.92);
      font-size:12px;
      margin-bottom:10px;
    }

    .p-name{
      margin:0;
      font-size:30px;
      font-weight:900;
      letter-spacing:.14em;
      line-height:1.1;
      color:var(--text);
      word-break:break-all;
    }

    .p-right{
      text-align:right;
      flex:0 0 auto;
    }

    .p-rank{
      font-family:"Cinzel", serif;
      font-weight:900;
      font-size:34px;
      letter-spacing:.06em;
      background: linear-gradient(180deg, var(--gold2), var(--gold), #a06a16);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow: 0 16px 60px rgba(214,177,94,.14);
      line-height:1;
    }

    .p-metric{
      margin-top:8px;
      color: rgba(233,230,221,.78);
      letter-spacing:.10em;
      font-size:12px;
    }

    .p-metric b{
      display:block;
      margin-top:6px;
      font-family:"Cinzel", serif;
      font-size:20px;
      letter-spacing:.08em;
      color: rgba(246,229,164,.95);
      font-weight:800;
    }
  </style>
</head>
<body>
  <div class="dust"></div>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="./logo.png" alt="logo" onerror="this.style.display='none'">
        <div class="brand-name">MVP FAMILY</div>
      </div>

      <nav class="nav" id="nav">
        <div class="pill active" data-target="sales">销冠龙虎榜</div>
        <div class="pill" data-target="single">单王龙虎榜</div>
        <div class="pill" data-target="recruit">招募龙虎榜</div>
        <div class="pill" data-target="points">积分龙虎榜</div>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- 销冠龙虎榜 -->
    <section class="view active" id="view-sales">
      <div class="poster-box">
        <div class="poster-frame">
          <img src="./posters/sales.JPEG" alt="销冠龙虎榜海报">
        </div>
      </div>
    </section>

    <!-- 单王龙虎榜 -->
    <section class="view" id="view-single">
      <div class="poster-box">
        <div class="poster-frame">
          <img src="./posters/single.JPEG" alt="单王龙虎榜海报">
        </div>
      </div>
    </section>

    <!-- 招募龙虎榜 -->
    <section class="view" id="view-recruit">
      <div class="poster-box">
        <div class="poster-frame">
          <img src="./posters/recruit.jpg" alt="招募龙虎榜海报">
        </div>
      </div>
    </section>

    <!-- 积分龙虎榜 -->
    <section class="view" id="view-points">
      <div class="points-board">
        <h2 class="points-title">积分排行榜</h2>
        <div class="points-grid" id="pointsGrid"></div>
      </div>
    </section>
  </main>

  <script>
    const DATA = {
      points: {
        metricLabel: "积分",
        metricSuffix: "分",
        cards: [
          { rank:"01", group:"MVP总区",    name:"梁莉", metric:965 },
          { rank:"02", group:"SUSU组",    name:"苏瑜", metric:725 },
          { rank:"03", group:"LILY组",   name:"宋文菁", metric:420 },
          { rank:"04", group:"GAGA组", name:"赵聪", metric:185 },
          { rank:"05", group:"KYRA组",     name:"徐恺彤", metric:170 },
          { rank:"06", group:"F组",       name:"林卓怡", metric:155 }
        ]
      }
    };

    const fmt = (v) => Number.isInteger(v) ? String(v) : (Math.round(v * 10) / 10).toFixed(1);
    const safe = (s) => (s ?? "").toString().replace(/[<>&"]/g, c => ({
      "<":"&lt;",
      ">":"&gt;",
      "&":"&amp;",
      '"':"&quot;"
    }[c]));

    const pointsGrid = document.getElementById("pointsGrid");
    pointsGrid.innerHTML = DATA.points.cards.map(c => `
      <div class="p-card">
        <div class="p-left">
          <div class="pill-group">${safe(c.group)}</div>
          <p class="p-name">${safe(c.name)}</p>
        </div>
        <div class="p-right">
          <div class="p-rank">${safe(c.rank)}</div>
          <div class="p-metric">
            ${safe(DATA.points.metricLabel)}
            <b>${fmt(c.metric)}${safe(DATA.points.metricSuffix)}</b>
          </div>
        </div>
      </div>
    `).join("");

    const nav = document.getElementById("nav");
    const pills = Array.from(nav.querySelectorAll(".pill"));
    const views = {
      sales: document.getElementById("view-sales"),
      single: document.getElementById("view-single"),
      recruit: document.getElementById("view-recruit"),
      points: document.getElementById("view-points")
    };

    function setActive(key){
      pills.forEach(p => p.classList.toggle("active", p.dataset.target === key));
      Object.entries(views).forEach(([k, el]) => {
        el.classList.toggle("active", k === key);
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    nav.addEventListener("click", (e) => {
      const pill = e.target.closest(".pill");
      if(!pill) return;
      setActive(pill.dataset.target);
    });
  </script>
</body>
</html>
